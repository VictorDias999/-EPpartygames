<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trono das Sombras - MVP 1.0</title>

<style>
body {
    background-color: #1a1a1a;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
}

h1 {
    color: gold;
}

.player-box {
    border: 2px solid gold;
    border-radius: 10px;
    padding: 15px;
    margin: 15px 0;
}

.actions {
    margin-top: 20px;
}

button {
    padding: 12px;
    margin: 8px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
}

button:hover {
    opacity: 0.9;
}

.log {
    margin-top: 20px;
    border: 1px solid gray;
    padding: 10px;
    min-height: 180px;
    text-align: left;
    border-radius: 10px;
}

#log {
    max-height: 250px;
    overflow-y: auto;
}
</style>
</head>

<body>

<div class="container">

    <h1>🏰 Trono das Sombras</h1>

    <div class="player-box">
        <h2>Você</h2>
        <p>❤️ Vida: <span id="playerLife">3</span></p>
        <p>🪙 Moedas: <span id="playerCoins">2</span></p>
    </div>

    <div class="player-box">
        <h2>IA</h2>
        <p>❤️ Vida: <span id="aiLife">3</span></p>
        <p>🪙 Moedas: <span id="aiCoins">2</span></p>
    </div>

    <div class="actions">
        <button onclick="comerciante()">
            💰 Comerciante (+3 moedas)
        </button>

        <button onclick="cavaleiro()">
            ⚔️ Cavaleiro (3 moedas)
        </button>
    </div>

    <div class="log">
        <h3>Registro da Partida</h3>
        <div id="log"></div>
    </div>

</div>

<script>

let playerLife = 3;
let aiLife = 3;

let playerCoins = 2;
let aiCoins = 2;

function updateUI() {

    document.getElementById("playerLife").textContent = playerLife;
    document.getElementById("aiLife").textContent = aiLife;

    document.getElementById("playerCoins").textContent = playerCoins;
    document.getElementById("aiCoins").textContent = aiCoins;
}

function addLog(text) {

    const log = document.getElementById("log");

    log.innerHTML += text + "<br>";

    log.scrollTop = log.scrollHeight;
}

function comerciante() {

    playerCoins += 3;

    addLog("💰 Você usou Comerciante e ganhou 3 moedas.");

    endTurn();
}

function cavaleiro() {

    if (playerCoins < 3) {

        addLog("❌ Você não possui moedas suficientes.");

        return;
    }

    playerCoins -= 3;

    aiLife--;

    addLog("⚔️ Você usou Cavaleiro e causou 1 de dano.");

    checkVictory();

    if (aiLife > 0) {
        endTurn();
    }
}

function endTurn() {

    playerCoins += 2;

    aiTurn();

    updateUI();
}

function aiTurn() {

    aiCoins += 2;

    if (aiCoins >= 3) {

        aiCoins -= 3;

        playerLife--;

        addLog("⚔️ A IA usou Cavaleiro e causou 1 de dano.");

    }
    else {

        aiCoins += 3;

        addLog("💰 A IA usou Comerciante.");
    }

    checkVictory();
}

function checkVictory() {

    if (playerLife <= 0) {

        alert("💀 Você perdeu!");

        location.reload();
    }

    if (aiLife <= 0) {

        alert("🏆 Você venceu!");

        location.reload();
    }

    updateUI();
}

updateUI();

</script>

</body>
</html>
